{% extends "base.html" %}
{% block title %}כניסת מנהל{% endblock %}

{% block content %}

<section class="section" style="min-height: 70vh; display:flex; align-items:center;">
  <div class="container" style="max-width: 420px;">

    <div class="card" style="padding: 2.5rem;">
      <h1 style="font-size:1.6rem; margin-bottom:1.5rem; color:var(--color-primary);">
        🔒 כניסת מנהל
      </h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash flash--{{ category }}" style="margin-bottom:1rem;">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="form-group">
          <label class="form-label" for="password">סיסמה</label>
          <input type="password" id="password" name="password"
                 class="form-input" placeholder="הכניסו סיסמה"
                 required autofocus dir="ltr" style="text-align:left;" />
        </div>
        <button type="submit" class="btn btn--primary btn--large" style="width:100%;">
          כניסה
        </button>
      </form>
    </div>

  </div>
</section>

{% endblock %}
